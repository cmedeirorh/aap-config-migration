---
- name: Migrate AAP Configuration (2.4 -> 2.6)
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Step 1 - Export from AAP 2.4
      ansible.builtin.include_role:
        name: roles/aap_migration
      vars:
        aap_action: 'export'
        aap_host: "https://aap24.example.com"
        aap_username: "admin"
        aap_password: "your_aap24_password"
        aap_export_file_path: "/tmp/aap_export.json"

    - name: Step 2 - Import to AAP 2.6
      ansible.builtin.include_role:
        name: aap_migration
      vars:
        aap_action: 'import'
        aap_host: "https://aap26.example.com"
        aap_username: "admin"
        aap_password: "your_aap26_password"
        aap_export_file_path: "/tmp/aap_export.json"
