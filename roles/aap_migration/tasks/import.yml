---
# roles/aap_migration/tasks/import.yml

- name: "Local | Find exported asset files"
  ansible.builtin.find:
    paths: "{{ aap_migration_export_dir }}"
    patterns: "*.json"
  register: _export_files
  delegate_to: localhost
  run_once: true

- name: "Local | Initialize empty import payload"
  ansible.builtin.set_fact:
    _import_payload: {}

- name: "Local | Build import payload dynamically from files"
  ansible.builtin.set_fact:
    _import_payload: >-
      {{
        _import_payload | combine({
          item.path | basename | regex_replace('\.json$', ''): lookup('file', item.path) | from_json
        })
      }}
  loop: "{{ _export_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  no_log: true 

- name: "AAP Dest | Import configuration assets"
  ansible.controller.import:
    controller_host: "{{ aap_migration_dest_host }}"
    controller_username: "{{ aap_migration_dest_username }}"
    controller_password: "{{ aap_migration_dest_password }}"
    validate_certs: "{{ aap_migration_validate_certs }}"
    assets: "{{ _import_payload }}"
