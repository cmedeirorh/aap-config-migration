---
# roles/aap_migration/tasks/import.yml

- name: "Local | Find exported asset files"
  ansible.builtin.find:
    paths: "{{ aap_migration_export_dir }}"
    patterns: "*.json"
  register: _export_files
  delegate_to: localhost
  run_once: true

- name: "AAP Dest | Import configuration assets individually"
  ansible.controller.import:
    controller_host: "{{ aap_migration_dest_host }}"
    controller_username: "{{ aap_migration_dest_username }}"
    controller_password: "{{ aap_migration_dest_password }}"
    validate_certs: "{{ aap_migration_validate_certs }}"
    # Construct a dictionary on the fly containing just the current asset type
    assets: "{{ { item.path | basename | regex_replace('\\.json$', '') : lookup('file', item.path) | from_json } }}"
  loop: "{{ _export_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  # Continue execution even if importing a specific asset type fails
  ignore_errors: true
  register: _import_results

- name: "AAP Dest | Report import errors per asset type"
  ansible.builtin.debug:
    msg: 
      - "WARNING: Failed to import {{ item.item.path | basename }}"
      - "Error details: {{ item.msg | default('Unknown error occurred. Check AAP API logs.') }}"
  # Loop through the results of the previous task
  loop: "{{ _import_results.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
  # Only trigger the debug message if this specific loop iteration failed
  when: item.failed | default(false)
