---
# Action to perform: 'export' or 'import'
aap_action: 'export'

# The path to store the exported JSON/YAML data
export_dir: "./aap_exports"

# AAP Connection Variables (Override these at playbook runtime)
aap_host: ""
aap_username: ""
aap_password: ""
aap_validate_certs: false

# Export Settings
aap_export_all: true
